<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>GitHub Page</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <style>
    body {
        background-color: #e1d2a6;
        color: black;
        display: flex;
        justify-content: space-between;
        height: 100vh;
        overflow: hidden;
    }
    .banner {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        background-color: black;
        color: white;
        text-align: left;
        padding: 35px;
        font-size: 24px;
        box-shadow: 0 4px 20px black;
        z-index: 1000; /* Ensures banner stays above other content */
    }
    .profile-image-container {
        flex: 0 0 30%; /* Occupies 30% of the page width on the right */
        display: flex;
        justify-content: flex-end;
        align-items: center;
        height: 100vh; /* Ensure it fills the entire height */
        position: relative;
        z-index: 1; /* Lower z-index so the banner appears above the image */
    }
    .profile-image {
        height: 100%; /* Full height from top to bottom */
        width: auto;
        object-fit: cover; /* Maintains aspect ratio */
        box-shadow: -4px 0px 20px #a07856; /* Adds shadow on the left */
        background-color: #dbcfab;
    }
    .content {
        flex: 1;
        padding: 20px;
        display: flex;
        flex-direction: column;
        justify-content: flex-end;
        margin-top: 50px; /* Adjusts for the banner height */
    }
    .heading {
        font-size: 32px;
        margin-bottom: 20px;
        font-weight: bold;
        text-align: center;
    }
    .project-buttons {
        display: flex;
        gap: 20px;
        margin-bottom: 20px;
        justify-content: center;
    }
    .btn-custom {
        background-color: #a07856;
        border: none;
        padding: 20px 35px;
        font-size: 16px;
        border-radius: 5px;
        transition: background-color 0.3s ease-in-out, background-image 0.3s ease-in-out;
        color: black;
    }
    @media (max-width: 768px) {
        .profile-image {
            width: 100%;
            height: auto;
            object-fit: contain;
        }
        .content {
            flex: none;
            padding: 10px;
            justify-content: center;
        }
        .heading {
            font-size: 24px;
        }
        .project-buttons {
            flex-direction: column;
            align-items: center;
        }
    }
</style>
</head>
<body>

    <!-- Banner at the top -->
<div class="banner">
    
</div>

<div class="content">
    <div class="heading">My Projects</div>
    <div class="project-buttons">
        <button class="btn btn-custom">Project 1</button>
        <button class="btn btn-custom">Project 2</button>
        <button class="btn btn-custom">Project 3</button>
        <button class="btn btn-custom">Project 4</button>
        <button class="btn btn-custom">Project 5</button>
    </div>
</div>

<div class="profile-image-container">
    <img src="https://imgur.com/lT1NPQX.jpg" alt="Profile Image" class="profile-image">
</div>

<script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js"></script>
<script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
</body>
</html>
